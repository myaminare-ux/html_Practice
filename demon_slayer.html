<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="귀멸의 칼날, 무한성평, 극장판, 영화, CGV, 상영시간, 예매">
    <meta name="description" content="본문 바로가기 주요메뉴 바로가기 주요메뉴 바로가기. CGV. 홈; 씨네톡; 예매·예약; 매점; 더보기. 상영관 찾기; 특별관. CJ CGV(주). 대표이사 : 정종민.">
    <title>극장판 귀멸의 칼날-무한성편 | CGV</title>
    <!-- 파비콘 -->
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/4241/4241295.png" type="image/x-icon">
    <!-- 웹 글꼴 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <!-- 디자인 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/demon_slayer.css">
</head>
<body>
    <div id="movie">
        <!-- 1. 상단 바(뒤로가기, 홈, 공유, 즐겨찾기) -->
        <div class="top_g">
            <div class="left">
                <a href="#" class="back_btn"><img src="./images/back_btn.svg" alt="뒤로가기"></a>
                <a href="#" class="home_btn"><img src="./images/home_btn.svg" alt="홈으로 이동하기"></a>
            </div><!-- e:left -->
            <div class="right">
                <a href="#" class="share_btn"><img src="./images/share_btn.svg" alt="공유하기"></a>
                <a href="#" class="bookmark_btn"><img src="./images/bookmark_btn.svg" alt="즐겨찾기"></a>
            </div><!-- e:right -->
        </div><!-- e:top_g -->
        <!-- 2. 영화 제목, 이용 등급 -->
        <div class="title">
            <h1>극장판 귀멸의 칼날-무한성편</h1>
            <p class="use_grade"><img src="./images/use_grade.png" alt="15세 이상 이용가"></p>
        </div><!-- e:title -->
        <!-- 3. 개봉날짜, 상영시간, 분류 -->
        <div class="info">
            <p class="date">2026.03.25 재개봉</p>
            <p class="time">2시간35분</p>
            <p class="category">애니메이션</p>
        </div><!-- e:info -->
        <!-- 4. 예매율, 누적관객수, 에그지수 -->
        <div class="rate">
            <ul class="rate_info">
                <li class="sell">
                    <p><img src="./images/sell.png" alt=""></p>
                    <div class="sell_info">
                        <p class="book_sell">예매율</p>
                        <p class="book_num">0%</p>
                    </div>
                </li>
                <li class="audience">
                    <p><img src="./images/audience.png" alt=""></p>
                    <div class="audience_info">
                        <p class="book_audience">누적관객수</p>
                        <p class="book_num">581만</p>
                    </div>
                </li>
                <li class="egg">
                    <p><img src="./images/egg.png" alt=""></p>
                    <div class="egg_info">
                        <p class="book_egg">에그지수</p>
                        <p class="book_num">96%</p>
                    </div>
                </li>
            </ul><!-- e:rate_info -->
        </div><!-- e:rate -->
        <!-- 5. 프롤로그, 요약 -->
        <div class="dis">
            <h2 class="dis_title">프롤로그</h2>
            <p class="dis_content">혈귀로 변해버린 여동생 네즈코를 인간으로 되돌리기 위해<br> 혈귀를 사냥하는 조직인 <귀살대>에 입대한 카마도 탄지로.<br> 입대 후 동료인 아가츠마 젠이츠, 하시비라 이노스케와 함께 많은 혈귀와 싸우고,<br> 성장하면서 세 사람의 우정과 유대는 깊어진다.</p>
        </div><!-- e:dis -->
    </div>
</body>
</html>
