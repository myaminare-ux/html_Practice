<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>원신-위젯</title>
    <!-- 파비콘 -->
    <link rel="shortcut icon" href="./images/wish_stone.png" type="image/x-icon">
    <!-- 웹 글꼴 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <!-- 디자인 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/genshin_widget.css">
</head>
<body>
    <div id="widget">
        <!-- 1행 : 날짜, 검색, 아이콘 -->
        <div class="top_g">
            <a href="#" class="left_g">
                <p class="day">일요일</p>
                <p class="date"><span class="mon">06</span>/<span class="dat">28</span></p>
            </a><!-- e:days -->
            <div class="right_g">
                <a href="#" class="search">
                    <span>콜롬비나</span>
                    <img class="search_btn" src="./images/widget_search_btn.svg" alt="검색하기">
                </a><!-- e:search -->
                <a href="#" class="setting_btn"><img src="./images/widget_setting_btn.svg" alt="설정"></a>
                <a href="#" class="refresh_btn"><img src="./images/widget_refresh_btn.svg" alt="새로고침"></a>
            </div><!-- e:right_g -->
        </div><!-- e:top_g -->
        <!-- 2행 : 레진, 선계, 출석 -->
        <div class="bottom_g">
            <div class="b_left_g">
                <!-- 1-1. 레진 -->
                <a href="#" class="resin">
                    <p class="thum"><img src="./images/widget_resin_icon.webp" alt="레진"></p>
                    <div class="info_g">
                        <p class="capacity"><span>30</span>/200</p>
                        <p class="time"><span class="hour">22</span>시간 <span class="min">36</span>분</p>
                    </div><!-- e:info_g -->
                </a><!-- e:resin -->
                <!-- 1-2. 선계 -->
                <a href="#" class="currency">
                    <p class="thum"><img src="./images/widget_currency_icon.png" alt="선계 화폐"></p>
                    <div class="info_g">
                        <p class="capacity"><span>60</span>/<span>2400</span></p>
                        <p class="time"><span class="hour">77</span>시간 <span class="min">39</span>분</p>
                    </div><!-- e:info_g -->
                </a><!-- e:currency -->
            </div><!-- e:b_left_g -->
            <a href="#" class="b_right_g">
                <p class="thum"><img src="./images/wish_stone.png" alt=""></p>
                <div class="check_in">
                    <p class="title">출석체크</p>
                    <p class="check_in_btn"><img src="./images/widget_check_move_btn.svg" alt="바로가기">
                    </p>
                </div><!-- e:check_in -->
            </a><!-- e:b_right_g -->
        </div><!-- e:bottom_g -->
    </div><!-- e:widget -->
</body>
</html>
